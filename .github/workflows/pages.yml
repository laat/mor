name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - website/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned to the commit immediately before pnpm/action-setup#212, which
      # broke the `version` input by switching to a bootstrap+self-update
      # architecture. See pnpm/action-setup#225 — once that lands a fix,
      # move back to a floating tag.
      - uses: pnpm/action-setup@2e223e0f0d2b8fd9872cbadb8b7428e5f8b5556d
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Verify pnpm version
        run: pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter website build
      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r website/dist/* _site/docs/
          cp website/landing.html _site/index.html
          cp website/public/CNAME _site/CNAME
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
