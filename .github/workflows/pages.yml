name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [website/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Debug pnpm
        working-directory: website
        run: |
          which pnpm
          pnpm --version
          echo '--- pwd ---'
          pwd
          ls -la
          echo '--- pnpm-workspace.yaml ---'
          cat pnpm-workspace.yaml || echo 'missing'
          echo '--- package.json pnpm field ---'
          node -e "console.log(JSON.stringify(require('./package.json').pnpm, null, 2))"
          echo '--- pnpm config get ---'
          pnpm config get only-built-dependencies || true
          pnpm config list || true
      - run: pnpm install --frozen-lockfile
        working-directory: website
      - run: pnpm build
        working-directory: website
      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp -r website/dist/* _site/docs/
          cp website/landing.html _site/index.html
          cp website/public/CNAME _site/CNAME
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
