name: Update Documentation

on:
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run Claude to update docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx @anthropic-ai/claude-code@latest -p "
          Update documentation to match current source code. Be efficient.

          1. Run git log --oneline -5 to see recent changes.
          2. Read src/cli.ts lines 60-120 for command definitions.
          3. Read src/operations-server.ts — grep for app.get/app.post for HTTP endpoints.
          4. Check each doc file and only edit those with actual discrepancies:
             - README.md (commands table, HTTP API table, examples)
             - CLAUDE.md (database tables description)
             - man/mor.1 (commands, options, version)
             - website/src/content/docs/cli.md (commands table, examples)
             - website/src/content/docs/getting-started.md (quick start examples)
             - website/src/content/docs/storage.md (database tables)
             - website/src/content/docs/integration/mcp.md (tools table)
             - website/src/content/docs/integration/http.md (REST API table)

          Rules:
          - Only fix factual inaccuracies
          - Do NOT rewrite prose, add sections, or change tone
          - Do NOT edit files under src/
          - If docs are correct, make no changes
          " --model claude-sonnet-4-6 --max-turns 15

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No documentation changes needed."
            exit 0
          fi
          branch="docs/auto-update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git add -A
          git commit -m "docs: auto-update documentation to match source code"
          git push origin "$branch"
          gh pr create \
            --title "docs: auto-update documentation" \
            --body "Automated documentation update by Claude. Review carefully before merging." \
            --label documentation
