name: Update Documentation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'docs:')"
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 20 --allowedTools 'Read,Glob,Grep,Edit,Write,Bash(pnpm build),Bash(pnpm test),Bash(git diff*),Bash(git log*)'"
          prompt: |
            You are updating documentation for the mor CLI tool.

            First, understand what changed recently:
            ```
            git log --oneline -10
            ```

            Then read the source code to understand the current state:
            - src/cli.ts — CLI commands and options
            - src/mcp.ts — MCP tools and response format
            - src/operations.ts — Operations interface
            - src/operations-server.ts — HTTP endpoints
            - src/db.ts — database schema

            Compare against these documentation files and fix discrepancies:
            - README.md — commands table, quick start examples, HTTP API table
            - CLAUDE.md — architecture section, database tables
            - man/mor.1 — command descriptions, options, examples, version
            - website/src/content/docs/cli.md — commands table, examples
            - website/src/content/docs/getting-started.md — quick start examples
            - website/src/content/docs/storage.md — file format, database tables
            - website/src/content/docs/integration/mcp.md — tools table, filtering
            - website/src/content/docs/integration/http.md — REST API table

            Rules:
            - Only fix factual inaccuracies — wrong flags, missing commands, outdated examples
            - Do NOT rewrite prose, add new sections, or change tone/style
            - Do NOT touch source code files
            - Verify with: pnpm build && pnpm test
            - If all docs are already correct, make no changes
